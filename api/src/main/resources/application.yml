server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host:     ${SPRING_MAIL_HOST:smtp.gmail.com}
    port:     ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth:            true
          starttls:
            enable:        true
            required:      true
          connectiontimeout: 5000
          timeout:           5000
          writetimeout:      5000

google:
  # Empty-string default lets the app start so the @PostConstruct check
  # can log a specific error instead of Spring crashing with a placeholder error.
  client-id: ${GOOGLE_CLIENT_ID:}

# Comma-separated allowed CORS origins.
# Override with the ALLOWED_ORIGINS environment variable in production.
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173}

jwt:
  # Must be at least 32 characters (256 bits) for HS256.
  # Set JWT_SECRET env var in Cloud Run — never commit a real value here.
  secret: ${JWT_SECRET:dev-secret-change-me-in-production-32chars}
  access-token-expiry-ms: 900000   # 15 minutes
  refresh-token-expiry-days: 7
  # Set to false for local HTTP development; always true in production.
  cookie-secure: ${JWT_COOKIE_SECURE:true}