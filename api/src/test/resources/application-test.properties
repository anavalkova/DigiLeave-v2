# Resolve ${MONGODB_URI} — no default in application.yml, required for context startup
MONGODB_URI=mongodb://localhost:27017/digileave-test

# Resolve ${SPRING_MAIL_*} placeholders
SPRING_MAIL_HOST=smtp.example.com
SPRING_MAIL_PORT=587
SPRING_MAIL_USERNAME=test@example.com
SPRING_MAIL_PASSWORD=test-password

# Resolve ${GOOGLE_CLIENT_ID} — empty default exists but be explicit
GOOGLE_CLIENT_ID=test-google-client-id

# Resolve ${JWT_SECRET} — dev default exists but be explicit
JWT_SECRET=test-secret-value-minimum-32-characters-long!!

# Resolve ${ALLOWED_ORIGINS}
ALLOWED_ORIGINS=http://localhost:5173
