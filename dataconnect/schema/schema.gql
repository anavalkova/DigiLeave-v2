type User @table {
  firstName: String!
  lastName: String!
  email: String!
  role: String!
  createdAt: Timestamp!
  department: String
  manager: User
}

type LeaveRequest @table {
  employee: User!
  startDate: Date!
  endDate: Date!
  status: String!
  requestedDays: Int!
  createdAt: Timestamp!
  approver: User
  rejectionReason: String
  approvedAt: Timestamp
}

type LeaveBalance @table {
  user: User!
  totalDays: Int!
  availableDays: Int!
  createdAt: Timestamp!
  updatedAt: Timestamp!
}

type LeavePolicy @table {
  name: String!
  annualEntitlementDays: Int!
  carryOverDays: Int!
  createdAt: Timestamp!
  description: String
  accrualFrequency: String
}